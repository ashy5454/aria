<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00ccff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="900" height="3" fill="url(#accent)" rx="2"/>

  <!-- Loop indicator dots -->
  <circle cx="60" cy="100" r="6" fill="#00ff88" opacity="0.9"/>
  <circle cx="80" cy="100" r="6" fill="#00ff88" opacity="0.5"/>
  <circle cx="100" cy="100" r="6" fill="#00ff88" opacity="0.2"/>

  <!-- ARIA text -->
  <text x="450" y="95" font-family="'Courier New', monospace" font-size="72" font-weight="bold"
        fill="url(#accent)" text-anchor="middle" letter-spacing="16">ARIA</text>

  <!-- Subtitle -->
  <text x="450" y="130" font-family="'Courier New', monospace" font-size="14"
        fill="#888888" text-anchor="middle" letter-spacing="4">AUTONOMOUS RESEARCH INTELLIGENCE AGENT</text>

  <!-- Bottom tagline -->
  <text x="450" y="168" font-family="'Courier New', monospace" font-size="11"
        fill="#444444" text-anchor="middle">you sleep. aria runs. you wake up to a proof.</text>

  <!-- Accent line bottom -->
  <rect x="0" y="197" width="900" height="3" fill="url(#accent)" rx="2" opacity="0.4"/>
</svg>
